      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    }

    .writing-source-pane,
    .writing-preview-pane {
      display: grid;
      min-width: 0;
      min-height: 0;
      grid-template-rows: minmax(0, 1fr) auto;
    }

    .writing-source-pane {
      border-right: 1px solid var(--line);
    }

    .writing-source {
      width: 100%;
      height: 100%;
      min-height: 0;
      padding: 1rem;
      color: var(--text);
      background: var(--page);
      border: 0;
      border-radius: 0;
      font: 0.84rem/1.55 ui-monospace, "Cascadia Code", "SFMono-Regular", Consolas, monospace;
      resize: none;
      tab-size: 2;
    }

    .writing-source:focus {
      outline: 2px solid var(--focus);
      outline-offset: -2px;
    }

    .writing-compile-log {
      max-height: 12rem;
      overflow: auto;
      background: var(--card);
      border-top: 1px solid var(--line);
    }

    .writing-compile-log summary {
      padding: 0.45rem 0.7rem;
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
    }

    .writing-compile-output {
      margin: 0;
      padding: 0 0.7rem 0.7rem;
      overflow-wrap: anywhere;
      color: var(--text-secondary);
      font: 0.72rem/1.5 ui-monospace, "Cascadia Code", Consolas, monospace;
      white-space: pre-wrap;
    }

    .writing-preview-frame {
      width: 100%;
      height: 100%;
      min-height: 0;
      background: var(--card);
      border: 0;
    }

    .writing-preview-empty {
      display: grid;
      height: 100%;
      margin: 0;
      padding: 1rem;
      place-items: center;
      color: var(--muted);
      background: var(--card);
      text-align: center;
    }

    .writing-view-switch {
      display: none;
      margin-left: auto;
    }

    .empty-state {
      margin: 1.5rem 0 0;
      padding: 2rem 1rem;
      color: var(--muted);
      background: var(--card);
      border-radius: 0.75rem;
      text-align: center;
    }

    .site-footer {
      padding: 1rem;
      color: var(--subtle);
      border-top: 1px solid var(--line);
      font-size: 0.875rem;
      text-align: center;
    }

    .site-footer p {
      margin: 0;
    }

    @media (max-width: 42rem) {
      .writing-editor-shell {
        grid-template-rows: auto auto auto minmax(0, 1fr);
      }

      .site-nav {
        grid-template-columns: 1fr auto;
        padding-top: 0.4rem;
      }

      .writing-editor-header {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .writing-editor-actions {
        grid-column: 1 / -1;
        justify-content: flex-end;
      }

      .writing-editor-details {
        grid-template-columns: 1fr;
      }

      .writing-editor-toolbar,
      .writing-view-switch {
        display: flex;
      }

      .writing-workspace {
        grid-template-columns: minmax(0, 1fr);
      }

      .writing-workspace[data-view="source"] .writing-preview-pane,
      .writing-workspace[data-view="preview"] .writing-source-pane {
        display: none;
      }

      .writing-source-pane {
        border-right: 0;
      }
    }

    @media (max-width: 30rem) {
      .section-container,
      .site-nav {
        width: calc(100% - 1.5rem);
      }

      .journal-authoring {
        align-items: stretch;
        flex-direction: column;
      }

      .journal-authoring-actions {
        justify-content: flex-end;
      }

      .editor-image-item {
        grid-template-columns: 3.75rem minmax(0, 1fr);
      }

      .editor-image-preview {
        width: 3.75rem;
        height: 3.75rem;
      }

      .editor-image-remove {
        grid-column: 2;
        justify-self: start;
      }

    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <template id="writing-editor-template">

      <header class="writing-editor-header">
        <button class="control-button writing-editor-back" type="button" data-writing-editor-action="close">Back</button>
        <div class="writing-editor-heading">

        </div>
        <div class="writing-editor-actions">

          <button class="control-button" type="button" data-writing-editor-action="compile">Save &amp; Compile</button>

        </label>

        <section class="writing-source-pane" aria-label="TeX source">
          <textarea class="writing-source" aria-label="TeX source" autocomplete="off" autocapitalize="off" spellcheck="false"></textarea>
          <details class="writing-compile-log">
            <summary>Compilation log</summary>
            <pre class="writing-compile-output">No compilation has run in this editor session.</pre>
          </details>
        </section>
        <section class="writing-preview-pane" aria-label="PDF preview">
          <iframe class="writing-preview-frame" title="PDF preview"></iframe>
          <p class="writing-preview-empty" hidden>Compile this document to create its PDF preview.</p>
        </section>
      </div>
    </section>
  </template>

  <script>
    (async () => {
      "use strict";

      const config = WRITING_CONFIG;
      const byId = (id) => document.getElementById(id);
      const sectionMap = new Map(Object.entries(config.sections));
      const moduleVersion = Date.now().toString();
      const loopbackHosts = new Set(["localhost", "127.0.0.1", "[::1]"]);
      const isLoopback = location.protocol === "http:" && loopbackHosts.has(location.hostname);
      const isFilePage = location.protocol === "file:";
      const writingEntriesByYear = new Map();
      const writingLoadPromises = new Map();
      const writingLoadErrors = new Map();
      const journalEntriesByYear = new Map();
      const journalLoadPromises = new Map();
      const journalLoadErrors = new Map();
      let writingCatalogError = null;
      let journalCatalogError = null;
      let writingYears = [];
      let journalYears = [];

      try {
        const catalog = await importDataModule("writing/catalog.js");
        writingYears = normalizeYears(catalog.default?.years);
      } catch (error) {
        writingCatalogError = error;
      }

      try {
        const catalog = await importDataModule("journals/catalog.js");
        journalYears = normalizeYears(catalog.default?.years);
      } catch (error) {
        journalCatalogError = error;
      }

      const yearsBySection = new Map([
        ["writing", writingYears],
        ["journal", journalYears]
      ]);
      const initialRoute = readRoute();
      const state = {
        section: initialRoute.sectionId,
        queries: Object.fromEntries([...sectionMap.keys()].map((sectionId) => [sectionId, ""])),
        years: Object.fromEntries(
          [...sectionMap.keys()].map((sectionId) => [sectionId, latestYear(sectionId)])
        )
      };
      state.years[initialRoute.sectionId] = initialRoute.year;
      const authoring = {
        connected: false,
        apiToken: "",
        row: null,
        status: null,
        newButton: null,
        editorDialog: null,
        editorForm: null,
        editorImages: [],
        relatedWritingChoices: [],
        originalEntry: null,
        originalBody: "",
        busy: false,
        confirmDialog: null,
        confirmResolver: null
      };
      const lightbox = {
        dialog: null,
        image: null,
        caption: null,
        trigger: null
      };

      const writingAuthoring = {
        connected: false,
        busy: false,
        status: null,
        newButton: null,
        createDialog: null,
        createForm: null,
        editor: null,
        source: null,
        title: null,
        summary: null,
        log: null,
        frame: null,
        emptyPreview: null,
        current: null,
        baseline: null,
        publishEnabled: false,
        unpublished: false
      };

      async function importDataModule(path, version = moduleVersion) {
        const url = new URL(path, location.href);
        url.searchParams.set("v", version);
        return import(url.href);
      }

      function normalizeYears(value) {
        if (!Array.isArray(value)) throw new TypeError("Catalog years must be an array.");
        return [...new Set(value.map(String).filter((year) => /^\d{4}$/.test(year)))]
          .sort((left, right) => right.localeCompare(left));
      }

      function sortEntries(entries, sectionId) {
        return [...(entries || [])].sort((left, right) => {
          const leftDate = sectionId === "journal" ? left.publishedAt : left.id;
          const rightDate = sectionId === "journal" ? right.publishedAt : right.id;
          return String(rightDate).localeCompare(String(leftDate));
        });
      }

      function writingDateFromId(value) {
        const match = /^(\d{4})(\d{2})(\d{2})-(\d{2})(\d{2})(\d{2})$/.exec(value || "");
        if (!match) return null;
        const parts = match.slice(1).map(Number);
        const date = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2], parts[3], parts[4], parts[5]));
        const normalized = [
          date.getUTCFullYear(),
          date.getUTCMonth() + 1,
          date.getUTCDate(),
          date.getUTCHours(),
          date.getUTCMinutes(),
          date.getUTCSeconds()
        ];
        if (parts.some((part, index) => part !== normalized[index])) return null;
        return `${match[1]}-${match[2]}-${match[3]}`;
      }

      function validateJournalEntries(value, year) {
        if (!Array.isArray(value)) throw new TypeError(`Journal ${year} must export an array.`);
        const ids = new Set();

        for (const entry of value) {
          if (!entry || typeof entry.id !== "string" || !entry.id) {
            throw new TypeError(`Journal ${year} contains an invalid id.`);
          }
          if (ids.has(entry.id)) throw new TypeError(`Journal ${year} contains duplicate id ${entry.id}.`);
          if (typeof entry.publishedAt !== "string" || entry.publishedAt.slice(0, 4) !== year) {
            throw new TypeError(`Journal ${entry.id} does not belong to ${year}.`);
          }
          if (typeof entry.content !== "string" || !Array.isArray(entry.images)) {
            throw new TypeError(`Journal ${entry.id} has invalid content or images.`);
          }
          if (entry.relatedWriting && (
            typeof entry.relatedWriting.id !== "string"
            || typeof entry.relatedWriting.title !== "string"
          )) {
            throw new TypeError(`Journal ${entry.id} has invalid related Writing data.`);
          }
          if (entry.updatedAt && Number.isNaN(Date.parse(entry.updatedAt))) {
            throw new TypeError(`Journal ${entry.id} has an invalid updatedAt timestamp.`);
          }
          ids.add(entry.id);
        }

        return sortEntries(value, "journal");
      }

      function validateWritingEntries(value, year) {
        if (!Array.isArray(value)) throw new TypeError(`Writing ${year} must export an array.`);
        const ids = new Set();

        for (const entry of value) {
          if (!entry || !writingDateFromId(entry.id)) {
            throw new TypeError(`Writing ${year} contains an invalid id.`);
          }
          if (ids.has(entry.id)) throw new TypeError(`Writing ${year} contains duplicate id ${entry.id}.`);
          if (entry.id.slice(0, 4) !== year) {
            throw new TypeError(`Writing ${entry.id} does not belong to ${year}.`);
          }
          if (typeof entry.title !== "string" || !entry.title.trim()) {
            throw new TypeError(`Writing ${entry.id} has an invalid title.`);
          }
          if (entry.summary !== undefined && typeof entry.summary !== "string") {
            throw new TypeError(`Writing ${entry.id} has an invalid summary.`);
          }
          ids.add(entry.id);
        }

        return sortEntries(value, "writing");
      }

      function loadWritingYear(year) {
        if (!year) return Promise.resolve([]);
        if (writingEntriesByYear.has(year)) return Promise.resolve(writingEntriesByYear.get(year));
        if (writingLoadPromises.has(year)) return writingLoadPromises.get(year);

        writingLoadErrors.delete(year);
        const promise = importDataModule(`writing/${year}.js`)
          .then((module) => {
            const entries = validateWritingEntries(module.default, year);
            writingEntriesByYear.set(year, entries);
            return entries;
          })
          .catch((error) => {
            writingLoadErrors.set(year, error);
            throw error;
          })
          .finally(() => writingLoadPromises.delete(year));

        writingLoadPromises.set(year, promise);
        return promise;
      }

      function loadJournalYear(year) {
        if (!year) return Promise.resolve([]);
        if (journalEntriesByYear.has(year)) return Promise.resolve(journalEntriesByYear.get(year));
        if (journalLoadPromises.has(year)) return journalLoadPromises.get(year);

        journalLoadErrors.delete(year);
        const promise = importDataModule(`journals/${year}.js`)
          .then((module) => {
            const entries = validateJournalEntries(module.default, year);
            journalEntriesByYear.set(year, entries);
            return entries;
          })
          .catch((error) => {
            journalLoadErrors.set(year, error);
            throw error;
          })
          .finally(() => journalLoadPromises.delete(year));

        journalLoadPromises.set(year, promise);
        return promise;
      }

      function currentSection() {
        return sectionMap.get(state.section);
      }

      function entryYear(sectionId, entry) {
        const date = sectionId === "journal" ? entry.publishedAt : entry.id;
        return typeof date === "string" ? date.slice(0, 4) : "";
      }

      function latestYear(sectionId) {
        return yearsBySection.get(sectionId)?.[0] || "";
      }

      function routeHash(sectionId, year) {
        return `#${sectionId}${year ? `/${year}` : ""}`;
      }

      function readRoute() {
        const [requestedSection, requestedYear] = location.hash.slice(1).split("/");
        const sectionId = sectionMap.has(requestedSection) ? requestedSection : config.defaultSection;
        const availableYears = yearsBySection.get(sectionId);
        const year = availableYears.includes(requestedYear) ? requestedYear : latestYear(sectionId);
        return { sectionId, year, hash: routeHash(sectionId, year) };
      }

      function updateRoute(sectionId, year, replace = false) {
        const url = new URL(location.href);
        url.hash = routeHash(sectionId, year);
        history[replace ? "replaceState" : "pushState"](null, "", url);
      }

      function entrySearchText(entry) {
        if (state.section === "journal") {
          return [
            entry.content,
            ...(entry.images || []).map((image) => image.alt),
            entry.relatedWriting?.title
          ].filter(Boolean).join(" ").toLocaleLowerCase();
        }

        return [entry.title, entry.summary].filter(Boolean).join(" ").toLocaleLowerCase();
      }

      function formatDate(dateText) {
        const date = new Date(`${dateText}T00:00:00Z`);
        return new Intl.DateTimeFormat("en", {
          day: "2-digit",
          month: "short",
          year: "numeric",
          timeZone: "UTC"
        }).format(date);
      }

      function formatJournalTimestamp(dateText, timeZone) {
        const parts = new Intl.DateTimeFormat("en", {
          day: "2-digit",
          month: "short",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          hourCycle: "h23",
          timeZone
        }).formatToParts(new Date(dateText));
        const value = (type) => parts.find((part) => part.type === type)?.value || "";
        return `${value("day")} ${value("month")} ${value("year")} · ${value("hour")}:${value("minute")}`;
      }

      function renderJournalTime(container, entry, timeZone) {
        const published = document.createElement("time");
        published.dateTime = entry.publishedAt;
        published.textContent = formatJournalTimestamp(entry.publishedAt, timeZone);
        container.append(published);

        if (entry.updatedAt) {
          const updated = document.createElement("time");
          updated.dateTime = entry.updatedAt;
          updated.textContent = formatJournalTimestamp(entry.updatedAt, timeZone);
          container.append(" · Edited ", updated);
        }
      }

      function formatJournalMonth(monthKey) {
        return new Intl.DateTimeFormat("en", {
          month: "long",
          year: "numeric",
          timeZone: "UTC"
        }).format(new Date(`${monthKey}-01T00:00:00Z`));
      }

      function renderSectionSwitch() {
        for (const button of document.querySelectorAll("[data-section]")) {
          button.setAttribute("aria-pressed", String(button.dataset.section === state.section));
        }
      }

      function renderYearFilter() {
        const yearFilter = byId("year-filter");
        const years = yearsBySection.get(state.section);

        yearFilter.replaceChildren();
        yearFilter.hidden = years.length === 0;

        for (const year of years) {
          const button = document.createElement("button");
          button.className = "year-filter-button";
          button.type = "button";
          button.dataset.year = year;
          button.setAttribute("aria-pressed", String(year === state.years[state.section]));
          button.textContent = year;
          yearFilter.append(button);
        }
      }

      function renderEntry(entry) {
        const fragment = byId("entry-template").content.cloneNode(true);
        const card = fragment.querySelector(".entry-card");
        const date = fragment.querySelector(".entry-date");
        const actions = fragment.querySelector(".entry-actions");
        const title = fragment.querySelector(".entry-title");
        const summary = fragment.querySelector(".entry-summary");

        const writingDate = writingDateFromId(entry.id);
        card.id = `writing-${entry.id}`;
        date.dateTime = writingDate;
        date.textContent = formatDate(writingDate);

        if (canAuthorWriting()) {
          const edit = document.createElement("button");
          const deleteButton = document.createElement("button");
          edit.className = "entry-action-button";
          edit.type = "button";
          edit.dataset.writingAction = "edit";
          edit.dataset.writingId = entry.id;
          edit.dataset.writingYear = entry.id.slice(0, 4);
          edit.textContent = "Edit";
          deleteButton.className = "entry-action-button danger-action";
          deleteButton.type = "button";
          deleteButton.dataset.writingAction = "delete";
          deleteButton.dataset.writingId = entry.id;
          deleteButton.dataset.writingYear = entry.id.slice(0, 4);
          deleteButton.textContent = "Delete";
          actions.append(edit, deleteButton);
        }
        actions.hidden = actions.childElementCount === 0;

        const anchor = document.createElement("a");
        anchor.className = "entry-title-link";
        anchor.href = `writing/${entry.id}/${entry.id}.pdf`;
        anchor.textContent = entry.title;
        anchor.target = "_blank";
        anchor.rel = "noopener";
        title.append(anchor);

        if (entry.summary) {
          const paragraph = document.createElement("p");
          paragraph.textContent = entry.summary;
          summary.append(paragraph);
        }
        summary.hidden = summary.childElementCount === 0;

        return fragment;
      }

      function renderJournalEntry(entry, timeZone) {
        const fragment = byId("journal-template").content.cloneNode(true);
        const post = fragment.querySelector(".journal-post");
        const header = fragment.querySelector(".journal-post-header");
        const time = fragment.querySelector(".journal-time");
        const content = fragment.querySelector(".journal-content");
        const media = fragment.querySelector(".journal-media");
        const related = fragment.querySelector(".journal-related");

        post.id = `journal-${entry.id}`;
        renderJournalTime(time, entry, timeZone);

        if (canAuthorJournal()) {
          const actions = document.createElement("div");
          const editButton = document.createElement("button");
          const deleteButton = document.createElement("button");
          actions.className = "journal-actions";
          editButton.className = "journal-action-button";
          editButton.type = "button";
          editButton.dataset.journalAction = "edit";
          editButton.dataset.journalId = entry.id;
          editButton.textContent = "Edit";
          deleteButton.className = "journal-action-button danger-action";
          deleteButton.type = "button";
          deleteButton.dataset.journalAction = "delete";
          deleteButton.dataset.journalId = entry.id;
          deleteButton.textContent = "Delete";
          actions.append(editButton, deleteButton);
          header.append(actions);
        }

        if (entry.content) {
          const paragraph = document.createElement("p");
          paragraph.textContent = entry.content;
          content.append(paragraph);
        }
        content.hidden = content.childElementCount === 0;

        const images = entry.images || [];
        media.dataset.count = String(images.length);
        for (const imageData of images) {
          const button = document.createElement("button");
          const image = document.createElement("img");
          const alt = imageData.alt || "";
          button.className = "journal-image-button";
          button.type = "button";
          button.dataset.journalImage = "";
          button.dataset.imageSrc = imageData.src;
          button.dataset.imageAlt = alt;
          button.setAttribute("aria-label", alt ? `View larger: ${alt}` : "View image larger");
          image.className = "journal-image";
          image.src = imageData.src;
          image.alt = alt;
          image.loading = "lazy";
          image.decoding = "async";
          button.append(image);
          media.append(button);
        }
        media.hidden = images.length === 0;

        if (entry.relatedWriting) {
          related.href = `writing/${entry.relatedWriting.id}/${entry.relatedWriting.id}.pdf`;
          related.textContent = `Related writing: ${entry.relatedWriting.title}`;
          related.target = "_blank";
          related.rel = "noopener";
        } else {
          related.hidden = true;
        }

        return fragment;
      }

      function visibleEntries() {
        const query = state.queries[state.section].trim().toLocaleLowerCase();
        const year = state.years[state.section];
        const entries = state.section === "journal"
          ? (journalEntriesByYear.get(year) || [])
          : (writingEntriesByYear.get(year) || []);
        return entries.filter((entry) => (
          entryYear(state.section, entry) === year
          && (!query || entrySearchText(entry).includes(query))
        ));
      }

      function renderWritingArchive(entries, archiveList) {
        const list = document.createElement("div");
        list.className = "entry-list";

        for (const entry of entries) {
          list.append(renderEntry(entry));
        }

        archiveList.append(list);
      }

      function renderJournalArchive(entries, archiveList, timeZone) {
        const groups = new Map();

        for (const entry of entries) {
          const month = entry.publishedAt.slice(0, 7);
          if (!groups.has(month)) groups.set(month, []);
          groups.get(month).push(entry);
        }

        for (const [month, monthEntries] of groups) {
          const section = document.createElement("section");
          const heading = document.createElement("h2");
          const feed = document.createElement("div");

          section.className = "journal-month-group";
          heading.className = "journal-month-title";
          heading.id = `month-${month}`;
          heading.textContent = formatJournalMonth(month);
          feed.className = "journal-feed";
          section.setAttribute("aria-labelledby", heading.id);

          for (const entry of monthEntries) {
            feed.append(renderJournalEntry(entry, timeZone));
          }

          section.append(heading, feed);
          archiveList.append(section);
        }
      }

      function renderArchive() {
        const archiveList = byId("archive-list");
        const section = currentSection();
        const year = state.years[state.section];

        archiveList.replaceChildren();

        const catalogError = state.section === "journal" ? journalCatalogError : writingCatalogError;
        const entriesByYear = state.section === "journal" ? journalEntriesByYear : writingEntriesByYear;
        const loadErrors = state.section === "journal" ? journalLoadErrors : writingLoadErrors;
        const sectionLabel = state.section === "journal" ? "Journal" : "Writing";

        if (catalogError) {
          byId("archive-summary").textContent = "";
          renderArchiveMessage(`${sectionLabel} data could not be loaded.`);
          return;
        }

        if (year && !entriesByYear.has(year)) {
          byId("archive-summary").textContent = "";
          renderArchiveMessage(loadErrors.has(year)
            ? `${sectionLabel} ${year} could not be loaded.`
            : `Loading ${sectionLabel} ${year}...`);
          return;
        }

        const filteredEntries = visibleEntries();
        const itemName = state.section === "journal"
          ? (filteredEntries.length === 1 ? "post" : "posts")
          : (filteredEntries.length === 1 ? "entry" : "entries");

        byId("archive-summary").textContent = `${filteredEntries.length} ${itemName}${year ? ` in ${year}` : ""}`;

        if (filteredEntries.length === 0) {
          const empty = document.createElement("p");
          empty.className = "empty-state";
          empty.textContent = state.queries[state.section].trim() ? section.noResults : section.empty;
          archiveList.append(empty);
          return;
        }

        if (state.section === "journal") {
          renderJournalArchive(filteredEntries, archiveList, section.timeZone);
        } else {
          renderWritingArchive(filteredEntries, archiveList);
        }
      }

      function renderArchiveMessage(message) {
        const notice = document.createElement("p");
        notice.className = "empty-state";
        notice.textContent = message;
        byId("archive-list").append(notice);
      }

      function openJournalLightbox(trigger) {
        if (!lightbox.dialog || lightbox.dialog.open) return;
        const alt = trigger.dataset.imageAlt || "";
        lightbox.trigger = trigger;
        lightbox.image.src = trigger.dataset.imageSrc || "";
        lightbox.image.alt = alt;
        lightbox.caption.textContent = alt;
        lightbox.caption.hidden = !alt;
        lightbox.dialog.showModal();
        lightbox.dialog.querySelector("[data-lightbox-action=\"close\"]").focus();
      }

      function renderSection() {
        const section = currentSection();
        const year = state.years[state.section];

        document.title = `${section.title} - Xayah Hina`;
        byId("section-title").textContent = section.title;
        byId("search-label").textContent = section.searchLabel;
        byId("search-input").placeholder = section.searchPlaceholder;
        byId("search-input").value = state.queries[state.section];

        renderSectionSwitch();
        renderYearFilter();
        const journalLocalSlot = byId("journal-local-slot");
        const writingLocalSlot = byId("writing-local-slot");
        journalLocalSlot.hidden = state.section !== "journal" || journalLocalSlot.childElementCount === 0;
        writingLocalSlot.hidden = state.section !== "writing" || writingLocalSlot.childElementCount === 0;

        const entriesByYear = state.section === "journal" ? journalEntriesByYear : writingEntriesByYear;
        const loadPromises = state.section === "journal" ? journalLoadPromises : writingLoadPromises;
        const loadErrors = state.section === "journal" ? journalLoadErrors : writingLoadErrors;
        const catalogError = state.section === "journal" ? journalCatalogError : writingCatalogError;
        const loadYear = state.section === "journal" ? loadJournalYear : loadWritingYear;
        const requestedSection = state.section;

        if (year && !entriesByYear.has(year) && !loadPromises.has(year) && !loadErrors.has(year) && !catalogError) {
          loadYear(year)
            .then(() => {
              if (state.section === requestedSection && state.years[requestedSection] === year) renderArchive();
            })
            .catch(() => {
              if (state.section === requestedSection && state.years[requestedSection] === year) renderArchive();
            });
        }

        renderArchive();
      }

      function selectSection(sectionId, updateHistory = true) {
        if (!sectionMap.has(sectionId) || sectionId === state.section) return;
        state.section = sectionId;
        if (!yearsBySection.get(sectionId).includes(state.years[sectionId])) {
          state.years[sectionId] = latestYear(sectionId);
        }
        if (updateHistory) updateRoute(sectionId, state.years[sectionId]);
        renderSection();
      }

      function selectYear(year, updateHistory = true) {
        if (!yearsBySection.get(state.section).includes(year) || year === state.years[state.section]) return;
        state.years[state.section] = year;
        if (updateHistory) updateRoute(state.section, year);
        renderSection();
      }

      function applyRoute() {
        const route = readRoute();
        state.section = route.sectionId;
        state.years[route.sectionId] = route.year;
        if (location.hash !== route.hash) updateRoute(route.sectionId, route.year, true);
        renderSection();
      }

      async function setupLocalAuthoring() {
        const journalSlot = byId("journal-local-slot");
        const writingSlot = byId("writing-local-slot");

        if (isFilePage) {
          for (const slot of [journalSlot, writingSlot]) {
            const notice = document.createElement("p");
            notice.className = "journal-local-notice";
            notice.textContent = "Local editing requires the localhost server. Run serve-local.cmd from the site folder.";
            slot.append(notice);
          }
          return;
        }

        if (!isLoopback) return;

        const rowFragment = byId("journal-authoring-template").content.cloneNode(true);
        authoring.row = rowFragment.querySelector(".journal-authoring");
        authoring.status = rowFragment.querySelector(".journal-authoring-status");
        authoring.newButton = rowFragment.querySelector('[data-authoring-action="new"]');
        journalSlot.append(rowFragment);

        const editorFragment = byId("journal-editor-template").content.cloneNode(true);
        authoring.editorDialog = editorFragment.querySelector("dialog");
        authoring.editorForm = editorFragment.querySelector("form");
        document.body.append(editorFragment);

        const confirmFragment = byId("confirm-template").content.cloneNode(true);
        authoring.confirmDialog = confirmFragment.querySelector("dialog");
        document.body.append(confirmFragment);

        authoring.newButton.addEventListener("click", openNewEditor);
        authoring.editorForm.addEventListener("submit", saveEditor);
        authoring.editorForm.elements.images.addEventListener("change", addEditorImages);
        authoring.editorDialog.addEventListener("cancel", (event) => {
          event.preventDefault();
          if (!authoring.busy) closeEditor();
        });

        for (const button of authoring.editorDialog.querySelectorAll('[data-editor-action="close"]')) {
          button.addEventListener("click", closeEditor);
        }

        authoring.editorDialog.querySelector(".editor-image-list").addEventListener("input", (event) => {
          const item = event.target.closest("[data-image-key]");
          if (!item || !event.target.matches("input")) return;
          const image = authoring.editorImages.find((candidate) => candidate.key === item.dataset.imageKey);
          if (image) image.alt = event.target.value;
        });

        authoring.editorDialog.querySelector(".editor-image-list").addEventListener("click", (event) => {
          const button = event.target.closest("[data-remove-image]");
          if (!button) return;
          removeEditorImage(button.dataset.removeImage);
        });

        byId("archive-list").addEventListener("click", (event) => {
          const button = event.target.closest("[data-journal-action]");
          if (!button || !canAuthorJournal() || authoring.busy) return;
          if (button.dataset.journalAction === "edit") openEditEditor(button.dataset.journalId);
          if (button.dataset.journalAction === "delete") deleteJournal(button.dataset.journalId);
        });

        for (const button of authoring.confirmDialog.querySelectorAll("[data-confirm-value]")) {
          button.addEventListener("click", () => authoring.confirmDialog.close(button.dataset.confirmValue));
        }
        authoring.confirmDialog.addEventListener("close", () => {
          authoring.confirmResolver?.(authoring.confirmDialog.returnValue === "delete");
          authoring.confirmResolver = null;
        });

        const writingRowFragment = byId("writing-authoring-template").content.cloneNode(true);
        writingAuthoring.status = writingRowFragment.querySelector(".writing-authoring-status");
        writingAuthoring.newButton = writingRowFragment.querySelector('[data-writing-action="new"]');
        writingSlot.append(writingRowFragment);

        const createFragment = byId("writing-create-template").content.cloneNode(true);
        writingAuthoring.createDialog = createFragment.querySelector("dialog");
        writingAuthoring.createForm = createFragment.querySelector("form");
        document.body.append(createFragment);

        const writingEditorFragment = byId("writing-editor-template").content.cloneNode(true);
        writingAuthoring.editor = writingEditorFragment.querySelector(".writing-editor-shell");
        writingAuthoring.source = writingEditorFragment.querySelector(".writing-source");
        writingAuthoring.title = writingEditorFragment.querySelector(".writing-title-input");
        writingAuthoring.summary = writingEditorFragment.querySelector(".writing-summary-input");
        writingAuthoring.log = writingEditorFragment.querySelector(".writing-compile-output");
        writingAuthoring.frame = writingEditorFragment.querySelector(".writing-preview-frame");
        writingAuthoring.emptyPreview = writingEditorFragment.querySelector(".writing-preview-empty");
        document.body.append(writingEditorFragment);

        writingAuthoring.newButton.addEventListener("click", openWritingCreateDialog);
        writingAuthoring.createForm.addEventListener("submit", createWriting);
        for (const button of writingAuthoring.createDialog.querySelectorAll('[data-writing-create-action="close"]')) {
          button.addEventListener("click", closeWritingCreateDialog);
        }
        writingAuthoring.createDialog.addEventListener("cancel", (event) => {
          event.preventDefault();
          closeWritingCreateDialog();
        });

        writingAuthoring.editor.addEventListener("click", (event) => {
          const action = event.target.closest("[data-writing-editor-action]")?.dataset.writingEditorAction;
          if (action === "close") requestCloseWritingEditor();
          if (action === "save") saveWritingDocument(false);
          if (action === "compile") saveWritingDocument(true);
          if (action === "publish") publishWritingDocument();
          const view = event.target.closest("[data-writing-view]")?.dataset.writingView;
          if (view) setWritingEditorView(view);
        });
        for (const input of [writingAuthoring.source, writingAuthoring.title, writingAuthoring.summary]) {
          input.addEventListener("input", updateWritingEditorStatus);
        }
        writingAuthoring.editor.addEventListener("keydown", (event) => {
          if ((event.ctrlKey || event.metaKey) && event.key.toLocaleLowerCase() === "s") {
            event.preventDefault();
            saveWritingDocument(true);
          }
        });
        byId("archive-list").addEventListener("click", (event) => {
          const button = event.target.closest("[data-writing-action]");
          if (!button || !canAuthorWriting() || writingAuthoring.busy) return;
          if (button.dataset.writingAction === "edit") {
            openWritingEditor(button.dataset.writingYear, button.dataset.writingId);
          }
          if (button.dataset.writingAction === "delete") {
            deleteWriting(button.dataset.writingYear, button.dataset.writingId);
          }
        });
        window.addEventListener("beforeunload", (event) => {
          if (!writingEditorIsDirty()) return;
          event.preventDefault();
          event.returnValue = "";
        });

        try {
          const response = await fetch("/api/local/status", { cache: "no-store" });
          const result = await response.json();
          if (!response.ok || !result.authoring || typeof result.token !== "string") {
            throw new Error(result.error || "The local editor service is unavailable.");
          }
          authoring.apiToken = result.token;
          authoring.connected = !result.journalError;
          writingAuthoring.connected = !result.writingError;
          writingAuthoring.publishEnabled = Boolean(result.autoPublish?.enabled);
          authoring.newButton.disabled = !canAuthorJournal();
          writingAuthoring.newButton.disabled = !canAuthorWriting();
          const journalInitial = initialSyncFeedback(result.autoPublish,
            journalCatalogError || result.journalError
              ? (result.journalError || "Journal catalog failed to load; local editing is disabled.")
              : "Local editing is enabled.",
          journalCatalogError || result.journalError ? "error" : "status");
          setAuthoringStatus(journalInitial.message, journalInitial.kind);
          const writingInitial = initialSyncFeedback(result.autoPublish,
            writingCatalogError || result.writingError
            ? (result.writingError || "Writing catalog failed to load; local editing is disabled.")
            : (result.tectonicVersion
              ? `Local Writing editor is enabled · ${result.tectonicVersion}`
              : "Local Writing editor is enabled, but Tectonic is unavailable."),
          writingCatalogError || result.writingError || !result.tectonicVersion ? "error" : "status", true);
          setWritingAuthoringStatus(writingInitial.message, writingInitial.kind);
          renderArchive();
        } catch (error) {
          authoring.connected = false;
          writingAuthoring.connected = false;
          authoring.apiToken = "";
          authoring.newButton.disabled = true;
          writingAuthoring.newButton.disabled = true;
          setAuthoringStatus("Local editor unavailable. Start the site with serve-local.cmd.", "error");
          setWritingAuthoringStatus("Local editor unavailable. Start the site with serve-local.cmd.", "error");
        }
      }

      function canAuthorJournal() {
        return authoring.connected && Boolean(authoring.apiToken) && !journalCatalogError;
      }

      function setAuthoringBusy(busy) {
        authoring.busy = busy;
        if (authoring.newButton) authoring.newButton.disabled = busy || !canAuthorJournal();
        if (authoring.editorForm) {
          for (const control of authoring.editorForm.elements) control.disabled = busy;
        }
      }

      function setAuthoringStatus(message, kind = "status") {
        if (!authoring.status) return;
        authoring.status.textContent = message;
        authoring.status.dataset.kind = kind;
      }

      function canAuthorWriting() {
        return writingAuthoring.connected && Boolean(authoring.apiToken) && !writingCatalogError;
      }

      function setWritingAuthoringStatus(message, kind = "status") {
        if (!writingAuthoring.status) return;
        writingAuthoring.status.textContent = message;
        writingAuthoring.status.dataset.kind = kind;
      }

      function initialSyncFeedback(sync, localMessage, localKind = "status", showWritingPending = false) {
        if (!sync?.enabled) return { message: localMessage, kind: localKind };
        if (sync.state === "failed") {
          return { message: `${localMessage} Auto-push unavailable: ${sync.message}`, kind: "error" };
        }
        if (showWritingPending && sync.writingPending) {
          return { message: `${localMessage} Writing changes are pending Publish.`, kind: localKind };
        }
        const branch = sync.branch ? ` on ${sync.branch}` : "";
        return { message: `${localMessage} Auto-push enabled${branch}.`, kind: localKind };
      }

      function operationSyncFeedback(result, localMessage, localKind = "status") {
        const sync = result?.sync;
        if (!sync?.enabled) return { message: localMessage, kind: localKind };
        if (sync.state === "synced") {
          return { message: `${localMessage} ${sync.message}`, kind: localKind };
        }
        if (sync.state === "unchanged") {
          return { message: `${localMessage} No remote update was needed.`, kind: localKind };
        }
        if (sync.state === "pending") {
          return { message: `${localMessage} Unpublished changes.`, kind: localKind };
        }
        return { message: `${localMessage} Saved locally, but auto-push failed: ${sync.message}`, kind: "error" };
      }

      async function localSiteRequest(path, payload) {
        const response = await fetch(path, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Local-Token": authoring.apiToken
          },
          body: JSON.stringify(payload)
        });
        let result;
        try {
          result = await response.json();
        } catch (error) {
          throw new Error("The local editor returned an invalid response.");
        }
        if (!response.ok) throw new Error(result.error || "The local editor request failed.");
        return result;
      }

      function localJournalRequest(action, payload) {
        return localSiteRequest(`/api/journal/${action}`, payload);
      }

      function localWritingRequest(action, payload) {
        return localSiteRequest(`/api/writing/${action}`, payload);
      }

      function writingEditorSnapshot() {
        if (!writingAuthoring.current) return "";
        return JSON.stringify({
          title: writingAuthoring.title.value,
          summary: writingAuthoring.summary.value,
          source: writingAuthoring.source.value
        });
      }

      function writingEditorIsDirty() {
        return Boolean(
          writingAuthoring.editor
          && !writingAuthoring.editor.hidden
          && writingAuthoring.current
          && writingEditorSnapshot() !== writingAuthoring.baseline
        );
      }

      function updateWritingEditorStatus() {
        if (!writingAuthoring.current || writingAuthoring.busy) return;
        const dirty = writingEditorIsDirty();
        const publish = writingAuthoring.editor.querySelector('[data-writing-editor-action="publish"]');
        publish.disabled = dirty || !writingAuthoring.publishEnabled || !writingAuthoring.unpublished;
        setWritingEditorStatus(dirty
          ? "Unsaved changes."
          : (writingAuthoring.unpublished ? "Saved locally · Unpublished changes." : "Saved and published."));
      }

      function setWritingEditorStatus(message, kind = "status") {
        if (!writingAuthoring.editor) return;
        const status = writingAuthoring.editor.querySelector(".writing-editor-status");
        status.textContent = message;
        status.dataset.kind = kind;
      }

      function setWritingEditorBusy(busy) {
        writingAuthoring.busy = busy;
        if (writingAuthoring.newButton) writingAuthoring.newButton.disabled = busy || !canAuthorWriting();
        if (writingAuthoring.createDialog) {
          for (const control of writingAuthoring.createDialog.querySelectorAll("button, input, textarea")) control.disabled = busy;
        }
        if (writingAuthoring.editor) {
          for (const control of writingAuthoring.editor.querySelectorAll("button, input, textarea")) control.disabled = busy;
          const publish = writingAuthoring.editor.querySelector('[data-writing-editor-action="publish"]');
          publish.disabled = busy || !writingAuthoring.publishEnabled || !writingAuthoring.unpublished;
        }
      }

      function writingDialogMessage(dialog, message, kind = "status") {
        const element = dialog.querySelector(".editor-message");
        element.textContent = message;
        element.dataset.kind = kind;
      }

      function openWritingCreateDialog() {
        if (!canAuthorWriting() || writingAuthoring.busy) return;
        writingAuthoring.createForm.reset();
        writingDialogMessage(writingAuthoring.createDialog, "");
        writingAuthoring.createDialog.showModal();
        writingAuthoring.createForm.elements.title.focus();
      }

      function closeWritingCreateDialog() {
        if (!writingAuthoring.busy && writingAuthoring.createDialog.open) writingAuthoring.createDialog.close();
      }

      async function createWriting(event) {
        event.preventDefault();
        if (!canAuthorWriting() || writingAuthoring.busy) return;
        const form = writingAuthoring.createForm.elements;
        const payload = {
          title: form.title.value.trim(),
          summary: form.summary.value.trim()
        };
        if (!payload.title) {
          writingDialogMessage(writingAuthoring.createDialog, "Title is required.", "error");
          return;
        }

        setWritingEditorBusy(true);
        writingDialogMessage(writingAuthoring.createDialog, "Creating...");
        try {
          const result = await localWritingRequest("create", payload);
          applyWritingServerData(result, true);
          writingAuthoring.createDialog.close();
          showWritingEditorData(result);
          const feedback = operationSyncFeedback(result, "Writing created locally.");
          setWritingEditorStatus(feedback.message, feedback.kind);
        } catch (error) {
          writingDialogMessage(writingAuthoring.createDialog, error.message || "Writing could not be created.", "error");
        } finally {
          setWritingEditorBusy(false);
        }
      }

      function applyWritingServerData(result, pushHistory = false) {
        const year = String(result.year || "");
        const years = normalizeYears(result.years);
        const entries = validateWritingEntries(result.entries, year);
        writingYears = years;
        yearsBySection.set("writing", years);
        if (entries.length > 0) writingEntriesByYear.set(year, entries);
        else writingEntriesByYear.delete(year);
        writingLoadErrors.delete(year);
        writingCatalogError = null;
        const selectedYear = entries.length > 0 ? year : latestYear("writing");
        state.years.writing = selectedYear;
        if (state.section === "writing") {
          const hash = routeHash("writing", selectedYear);
          if (location.hash !== hash) updateRoute("writing", selectedYear, !pushHistory);
          renderSection();
        }
      }

      function setWritingPreview(pdfUrl, pdfExists, version) {
        if (!pdfExists) {
          writingAuthoring.frame.hidden = true;
          writingAuthoring.frame.removeAttribute("src");
          writingAuthoring.emptyPreview.hidden = false;
          return;
        }
        const url = new URL(pdfUrl, location.href);
        url.searchParams.set("v", String(version || Date.now()));
        url.hash = "view=FitH";
        writingAuthoring.frame.src = url.href;
        writingAuthoring.frame.hidden = false;
        writingAuthoring.emptyPreview.hidden = true;
      }

      function showWritingEditorData(result) {
        if (result.sync) {
          writingAuthoring.publishEnabled = Boolean(result.sync.enabled);
          writingAuthoring.unpublished = Boolean(result.sync.writingPending);
        }
        writingAuthoring.current = {
          year: String(result.year),
          id: result.entry.id
        };
        writingAuthoring.source.value = result.source;
        writingAuthoring.title.value = result.entry.title;
        writingAuthoring.summary.value = result.entry.summary || "";
        writingAuthoring.editor.querySelector(".writing-editor-title").textContent = result.entry.title;
        writingAuthoring.log.textContent = "No compilation has run in this editor session.";
        writingAuthoring.editor.querySelector(".writing-compile-log").open = false;
        setWritingPreview(result.pdfUrl, result.pdfExists, result.pdfVersion);
        writingAuthoring.baseline = writingEditorSnapshot();
        writingAuthoring.editor.hidden = false;
        document.body.classList.add("writing-editor-open");
        setWritingEditorView("source");
        setWritingEditorStatus(writingAuthoring.unpublished
          ? "Saved locally · Unpublished changes."
          : "Saved and published.");
        writingAuthoring.source.focus();
      }

      async function openWritingEditor(year, id) {
        if (!canAuthorWriting() || writingAuthoring.busy) return;
        if (writingEditorIsDirty() && !window.confirm("Discard unsaved Writing changes?")) return;
        const entry = (writingEntriesByYear.get(year) || []).find((candidate) => candidate.id === id);
        if (!entry) return;
        setWritingEditorBusy(true);
        try {
          const result = await localWritingRequest("open", { year, id });
          showWritingEditorData(result);
        } catch (error) {
          setWritingAuthoringStatus(error.message || "Writing could not be opened.", "error");
        } finally {
          setWritingEditorBusy(false);
        }
      }

      function requestCloseWritingEditor() {
        if (writingAuthoring.busy) return;
        if (writingEditorIsDirty() && !window.confirm("Discard unsaved Writing changes?")) return;
        if (writingAuthoring.unpublished && !window.confirm("Leave these Writing changes saved locally but unpublished?")) return;
        writingAuthoring.editor.hidden = true;
        writingAuthoring.frame.removeAttribute("src");
        writingAuthoring.current = null;
        writingAuthoring.baseline = null;
        document.body.classList.remove("writing-editor-open");
      }

      function setWritingEditorView(view) {
        if (!writingAuthoring.editor || !["source", "preview"].includes(view)) return;
        writingAuthoring.editor.querySelector(".writing-workspace").dataset.view = view;
        for (const button of writingAuthoring.editor.querySelectorAll("[data-writing-view]")) {
          button.setAttribute("aria-pressed", String(button.dataset.writingView === view));
        }
      }

      async function saveWritingDocument(compile) {
        if (!writingAuthoring.current || writingAuthoring.busy) return;
        const payload = {
          year: writingAuthoring.current.year,
          id: writingAuthoring.current.id,
          title: writingAuthoring.title.value.trim(),
          summary: writingAuthoring.summary.value.trim(),
          source: writingAuthoring.source.value
        };
        if (!payload.title || !payload.source.trim()) {
          setWritingEditorStatus("Title and TeX source are required.", "error");
          return;
        }

        setWritingEditorBusy(true);
        setWritingEditorStatus(compile ? "Saving and compiling..." : "Saving...");
        try {
          const result = await localWritingRequest(compile ? "compile" : "save", payload);
          applyWritingServerData(result);
          showWritingEditorData(result);
          if (compile) {
            const compilation = result.compile || { ok: false, log: "No compilation result was returned." };
            writingAuthoring.log.textContent = compilation.log;
            writingAuthoring.editor.querySelector(".writing-compile-log").open = !compilation.ok;
            const feedback = operationSyncFeedback(result,
              compilation.ok
                ? "Saved and compiled successfully."
                : "Saved, but compilation failed. The last successful PDF is still shown.",
            compilation.ok ? "status" : "error");
            setWritingEditorStatus(feedback.message, feedback.kind);
            if (compilation.ok && matchMedia("(max-width: 42rem)").matches) setWritingEditorView("preview");
          } else {
            const feedback = operationSyncFeedback(result, "Writing saved locally.");
            setWritingEditorStatus(feedback.message, feedback.kind);
          }
        } catch (error) {
          setWritingEditorStatus(error.message || "Writing could not be saved.", "error");
        } finally {
          setWritingEditorBusy(false);
        }
      }

      async function publishWritingDocument() {
        if (!writingAuthoring.current || writingAuthoring.busy || !writingAuthoring.publishEnabled) return;
        if (writingEditorIsDirty()) {
          setWritingEditorStatus("Save the current changes locally before publishing.", "error");
          return;
        }

        setWritingEditorBusy(true);
        setWritingEditorStatus("Publishing...");
        try {
          const result = await localWritingRequest("publish", {
            year: writingAuthoring.current.year,
            id: writingAuthoring.current.id
          });
          writingAuthoring.unpublished = Boolean(result.sync?.writingPending);
          const feedback = operationSyncFeedback(result, "Writing published.");
          setWritingEditorStatus(feedback.message, feedback.kind);
        } catch (error) {
          setWritingEditorStatus(error.message || "Writing could not be published.", "error");
        } finally {
          setWritingEditorBusy(false);
        }
      }

      async function deleteWriting(year, id) {
        const entry = (writingEntriesByYear.get(year) || []).find((candidate) => candidate.id === id);
        if (!entry || !(await confirmDeletion(
          "Delete Writing?",
          "This permanently removes the Writing entry, TeX source, PDF, and its local directory."
        ))) return;

        setWritingEditorBusy(true);
        setWritingAuthoringStatus("Deleting Writing...");
        try {
          const result = await localWritingRequest("delete", { year, id });
          applyWritingServerData(result);
          const feedback = operationSyncFeedback(result, "Writing deleted locally.");
          setWritingAuthoringStatus(feedback.message, feedback.kind);
        } catch (error) {
          setWritingAuthoringStatus(error.message || "The Writing entry could not be deleted.", "error");
        } finally {
          setWritingEditorBusy(false);
        }
      }

      function relatedWritingDisplay(entry) {
        return `${entry.title} (${writingDateFromId(entry.id)})`;
      }

      async function populateRelatedWritingChoices(selectedId = "") {
        await Promise.all(writingYears.map((year) => loadWritingYear(year)));
        const list = authoring.editorDialog.querySelector("#related-writing-options");
        const entries = [...writingEntriesByYear.values()].flat()
          .sort((left, right) => right.id.localeCompare(left.id));
        authoring.relatedWritingChoices = entries.map((entry) => ({
          id: entry.id,
          title: entry.title,
          display: relatedWritingDisplay(entry)
        }));
        list.replaceChildren(...authoring.relatedWritingChoices.map((entry) => {
          const option = document.createElement("option");
          option.value = entry.display;
          return option;
        }));
        return authoring.relatedWritingChoices.find((entry) => entry.id === selectedId)?.display || "";
      }

      async function openNewEditor() {
        if (!canAuthorJournal() || authoring.busy) return;
        resetEditor();
        try {
          await populateRelatedWritingChoices();
        } catch (error) {
          setAuthoringStatus(error.message || "Writing suggestions could not be loaded.", "error");
          return;
        }
        authoring.originalEntry = null;
        authoring.editorDialog.querySelector(".dialog-title").textContent = "New Journal";
        authoring.editorDialog.querySelector('[data-editor-action="save"]').textContent = "Publish";
        authoring.editorDialog.querySelector(".editor-published-at").hidden = true;
        authoring.editorDialog.showModal();
        authoring.editorForm.elements.content.focus();
      }

      async function openEditEditor(id) {
        const year = state.years.journal;
        const entry = journalEntriesByYear.get(year)?.find((candidate) => candidate.id === id);
        if (!entry) return;

        resetEditor();
        let relatedWritingValue;
        try {
          relatedWritingValue = await populateRelatedWritingChoices(entry.relatedWriting?.id);
        } catch (error) {
          setAuthoringStatus(error.message || "Writing suggestions could not be loaded.", "error");
          return;
        }
        authoring.originalEntry = structuredClone(entry);
        authoring.originalBody = entry.content;
        authoring.editorForm.elements.content.value = authoring.originalBody;
        authoring.editorForm.elements.relatedWriting.value = relatedWritingValue;
        authoring.editorImages = entry.images.map((image) => ({
          key: crypto.randomUUID(),
          kind: "existing",
          src: image.src,
          alt: image.alt || "",
          previewUrl: new URL(image.src, location.href).href
        }));
        renderEditorImages();

        authoring.editorDialog.querySelector(".dialog-title").textContent = "Edit Journal";
        authoring.editorDialog.querySelector('[data-editor-action="save"]').textContent = "Save";
        const published = authoring.editorDialog.querySelector(".editor-published-at");
        published.hidden = false;
        published.textContent = `Published ${formatJournalTimestamp(entry.publishedAt, config.sections.journal.timeZone)}`;
        authoring.editorDialog.showModal();
        authoring.editorForm.elements.content.focus();
      }

      function resetEditor() {
        for (const image of authoring.editorImages) {
          if (image.kind === "new") URL.revokeObjectURL(image.previewUrl);
        }
        authoring.editorImages = [];
        authoring.relatedWritingChoices = [];
        authoring.originalEntry = null;
        authoring.originalBody = "";
        authoring.editorForm.reset();
        authoring.editorDialog.querySelector(".editor-image-list").replaceChildren();
        setEditorMessage("");
      }

      function closeEditor() {
        if (authoring.busy) return;
        if (authoring.editorDialog.open) authoring.editorDialog.close();
        resetEditor();
      }

      function addEditorImages(event) {
        const acceptedTypes = new Set(["image/jpeg", "image/png", "image/webp", "image/gif", "image/avif"]);
        const rejected = [];

        for (const file of event.currentTarget.files) {
          if (!acceptedTypes.has(file.type)) {
            rejected.push(file.name);
            continue;
          }
          authoring.editorImages.push({
            key: crypto.randomUUID(),
            kind: "new",
            file,
            alt: "",
            previewUrl: URL.createObjectURL(file)
          });
        }

        event.currentTarget.value = "";
        renderEditorImages();
        setEditorMessage(rejected.length > 0 ? `Unsupported image: ${rejected.join(", ")}` : "", rejected.length > 0 ? "error" : "status");
      }

      function removeEditorImage(key) {
        const image = authoring.editorImages.find((candidate) => candidate.key === key);
        if (image?.kind === "new") URL.revokeObjectURL(image.previewUrl);
        authoring.editorImages = authoring.editorImages.filter((candidate) => candidate.key !== key);
        renderEditorImages();
      }

      function renderEditorImages() {
        const list = authoring.editorDialog.querySelector(".editor-image-list");
        list.replaceChildren();

        for (const imageData of authoring.editorImages) {
          const item = document.createElement("div");
          const image = document.createElement("img");
          const alt = document.createElement("input");
          const remove = document.createElement("button");
          item.className = "editor-image-item";
          item.dataset.imageKey = imageData.key;
          image.className = "editor-image-preview";
          image.src = imageData.previewUrl;
          image.alt = "";
          alt.className = "field-input";
          alt.type = "text";
          alt.value = imageData.alt;
          alt.placeholder = "Alternative text (optional)";
          alt.setAttribute("aria-label", "Image alternative text");
          remove.className = "editor-image-remove";
          remove.type = "button";
          remove.dataset.removeImage = imageData.key;
          remove.textContent = "Remove";
          item.append(image, alt, remove);
          list.append(item);
        }
      }

      function setEditorMessage(message, kind = "status") {
        if (!authoring.editorDialog) return;
        const element = authoring.editorDialog.querySelector(".editor-message");
        element.textContent = message;
        element.dataset.kind = kind;
      }

      function confirmDeletion(title, message) {
        if (authoring.confirmResolver) return Promise.resolve(false);
        authoring.confirmDialog.querySelector(".confirm-title").textContent = title;
        authoring.confirmDialog.querySelector(".confirm-message").textContent = message;
        authoring.confirmDialog.returnValue = "cancel";
        authoring.confirmDialog.showModal();
        return new Promise((resolve) => {
          authoring.confirmResolver = resolve;
        });
      }

      function singaporeTimestamp(date = new Date()) {
        const parts = new Intl.DateTimeFormat("en", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hourCycle: "h23",
          timeZone: config.sections.journal.timeZone
        }).formatToParts(date);
        const value = (type) => parts.find((part) => part.type === type)?.value || "";
        return `${value("year")}-${value("month")}-${value("day")}T${value("hour")}:${value("minute")}:${value("second")}+08:00`;
      }

      function createJournalId(timestamp) {
        const compact = timestamp.slice(0, 19).replace(/[-:]/g, "").replace("T", "-");
        const random = [...crypto.getRandomValues(new Uint8Array(2))]
          .map((value) => value.toString(16).padStart(2, "0"))
          .join("");
        return `${compact}-${random}`;
      }

      function encodeImageFile(image) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.addEventListener("load", () => {
            const result = String(reader.result || "");
            const separator = result.indexOf(",");
            if (separator < 0) {
              reject(new Error(`Image ${image.file.name} could not be encoded.`));
              return;
            }
            resolve({
              key: image.key,
              name: image.file.name,
              type: image.file.type,
              data: result.slice(separator + 1)
            });
          });
          reader.addEventListener("error", () => reject(reader.error || new Error(`Image ${image.file.name} could not be read.`)));
          reader.readAsDataURL(image.file);
        });
      }

      function applyJournalData(year, entries, years, historyMode = "replace") {
        journalYears = normalizeYears(years);
        yearsBySection.set("journal", journalYears);
        journalCatalogError = null;
        journalLoadErrors.delete(year);

        if (entries.length > 0) journalEntriesByYear.set(year, sortEntries(entries, "journal"));
        else journalEntriesByYear.delete(year);

        const selectedYear = entries.length > 0 ? year : latestYear("journal");
        state.years.journal = selectedYear;

        if (state.section === "journal") {
          const expectedHash = routeHash("journal", selectedYear);
          if (location.hash !== expectedHash) updateRoute("journal", selectedYear, historyMode === "replace");
          renderSection();
        }
      }

      async function saveEditor(event) {
        event.preventDefault();
        if (!canAuthorJournal() || authoring.busy) return;

        const form = authoring.editorForm.elements;
        const body = form.content.value.trim();
        const relatedWritingValue = form.relatedWriting.value.trim();
        const relatedWriting = relatedWritingValue
          ? authoring.relatedWritingChoices.find((entry) => entry.display === relatedWritingValue)
          : null;

        if (!body && authoring.editorImages.length === 0) {
          setEditorMessage("Add content or at least one image.", "error");
          return;
        }
        if (relatedWritingValue && !relatedWriting) {
          setEditorMessage("Select a Writing from the suggestions.", "error");
          return;
        }

        setAuthoringBusy(true);
        setEditorMessage(authoring.originalEntry ? "Saving..." : "Publishing...");
        let completed = false;

        try {
          const original = authoring.originalEntry;
          const publishedAt = original?.publishedAt || singaporeTimestamp();
          const year = publishedAt.slice(0, 4);
          const id = original?.id || createJournalId(publishedAt);
          const contentChanged = !original
            || body !== authoring.originalBody;
          const content = !body
            ? ""
            : (original && !contentChanged
              ? structuredClone(original.content)
              : body);
          const imageSpecs = authoring.editorImages.map((image) => image.kind === "existing"
            ? { kind: "existing", src: image.src, alt: image.alt.trim() }
            : { kind: "new", key: image.key, alt: image.alt.trim() });
          const uploads = await Promise.all(
            authoring.editorImages.filter((image) => image.kind === "new").map(encodeImageFile)
          );
          const result = await localJournalRequest("save", {
            mode: original ? "edit" : "create",
            entry: { id, publishedAt, content, images: [], relatedWriting: relatedWriting ? { id: relatedWriting.id } : null },
            images: imageSpecs,
            uploads
          });
          const resultYear = String(result.year || "");
          const nextYears = normalizeYears(result.years);
          const nextEntries = validateJournalEntries(result.entries, resultYear);
          const cleanupFailures = Array.isArray(result.cleanupFailures) ? result.cleanupFailures : [];

          applyJournalData(resultYear, nextEntries, nextYears, result.status === "created" ? "push" : "replace");
          const feedback = operationSyncFeedback(result, cleanupFailures.length > 0
            ? `Journal saved, but ${cleanupFailures.length} old image file could not be removed.`
            : (result.status === "unchanged"
              ? "No Journal changes to save."
              : (result.status === "updated" ? "Journal updated locally." : "Journal published locally.")),
          cleanupFailures.length > 0 ? "error" : "status");
          setAuthoringStatus(feedback.message, feedback.kind);
          completed = true;
        } catch (error) {
          setEditorMessage(error.message || "The Journal could not be saved.", "error");
        } finally {
          setAuthoringBusy(false);
          if (completed) closeEditor();
        }
      }

      async function deleteJournal(id) {
        const year = state.years.journal;
        const previousEntries = journalEntriesByYear.get(year) || [];
        const entry = previousEntries.find((candidate) => candidate.id === id);
        if (!entry || !(await confirmDeletion(
          "Delete Journal?",
          "This permanently removes the Journal entry and its images from the local site folder."
        ))) return;

        setAuthoringBusy(true);
        setAuthoringStatus("Deleting Journal...");

        try {
          const result = await localJournalRequest("delete", { year, id });
          const nextYears = normalizeYears(result.years);
          const nextEntries = result.entries.length > 0
            ? validateJournalEntries(result.entries, year)
            : [];
          const cleanupFailures = Array.isArray(result.cleanupFailures) ? result.cleanupFailures : [];
          applyJournalData(year, nextEntries, nextYears, "replace");
          const feedback = operationSyncFeedback(result, cleanupFailures.length > 0
            ? `Journal deleted, but ${cleanupFailures.length} image file could not be removed.`
            : "Journal deleted locally.",
          cleanupFailures.length > 0 ? "error" : "status");
          setAuthoringStatus(feedback.message, feedback.kind);
        } catch (error) {
          setAuthoringStatus(error.message || "The Journal could not be deleted.", "error");
        } finally {
          setAuthoringBusy(false);
        }
      }

      byId("skip-link").textContent = config.labels.skip;
      byId("footer-text").textContent = `© ${new Date().getFullYear()} Xayah Hina. ${config.labels.footer}`;

      const lightboxFragment = byId("journal-lightbox-template").content.cloneNode(true);
      lightbox.dialog = lightboxFragment.querySelector("dialog");
      lightbox.image = lightboxFragment.querySelector(".journal-lightbox-image");
      lightbox.caption = lightboxFragment.querySelector(".journal-lightbox-caption");
      document.body.append(lightboxFragment);
      lightbox.dialog.addEventListener("click", (event) => {
        if (event.target === lightbox.dialog) lightbox.dialog.close();
      });
      lightbox.dialog.querySelector("[data-lightbox-action=\"close\"]").addEventListener("click", () => lightbox.dialog.close());
      lightbox.image.addEventListener("click", () => lightbox.dialog.close());
      lightbox.dialog.addEventListener("close", () => {
        const trigger = lightbox.trigger;
        lightbox.trigger = null;
        lightbox.image.removeAttribute("src");
        requestAnimationFrame(() => {
          if (trigger?.isConnected) trigger.focus();
        });
      });

      for (const button of document.querySelectorAll("[data-section]")) {
        button.addEventListener("click", () => selectSection(button.dataset.section));
      }

      byId("year-filter").addEventListener("click", (event) => {
        const button = event.target.closest("[data-year]");
        if (button) selectYear(button.dataset.year);
      });

      byId("search-input").addEventListener("input", (event) => {
        state.queries[state.section] = event.currentTarget.value;
        renderArchive();
      });

      byId("archive-list").addEventListener("click", (event) => {
        const imageButton = event.target.closest("[data-journal-image]");
        if (imageButton) openJournalLightbox(imageButton);
      });

      window.addEventListener("popstate", applyRoute);

      await setupLocalAuthoring();
      if (location.hash !== initialRoute.hash) updateRoute(initialRoute.sectionId, initialRoute.year, true);
      renderSection();
    })().catch((error) => {
      console.error("Writing site initialization failed.", error);
      const archiveList = document.getElementById("archive-list");
      if (archiveList) {
        const message = document.createElement("p");
        message.className = "empty-state";
        message.textContent = "The page could not be initialized.";
        archiveList.replaceChildren(message);
      }
    });
  </script>
