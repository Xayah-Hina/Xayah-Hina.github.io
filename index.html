  <script>
    (() => {
      "use strict";

      const config = WRITING_CONFIG;
      const byId = (id) => document.getElementById(id);
      const sectionMap = new Map(Object.entries(config.sections));
      const entriesBySection = new Map(
        [...sectionMap].map(([sectionId, section]) => [
          sectionId,
          [...section.entries].sort((left, right) => {
            const leftDate = sectionId === "journal" ? left.publishedAt : left.date;
            const rightDate = sectionId === "journal" ? right.publishedAt : right.date;
            return rightDate.localeCompare(leftDate);
          })
        ])
      );
      const yearsBySection = new Map(
        [...sectionMap.keys()].map((sectionId) => [
          sectionId,
          [...new Set(entriesBySection.get(sectionId).map((entry) => entryYear(sectionId, entry)))]
            .filter(Boolean)
            .sort((left, right) => right.localeCompare(left))
        ])
      );
      const initialRoute = readRoute();
      const state = {
        section: initialRoute.sectionId,
        queries: Object.fromEntries([...sectionMap.keys()].map((sectionId) => [sectionId, ""])),
        years: Object.fromEntries(
          [...sectionMap.keys()].map((sectionId) => [sectionId, latestYear(sectionId)])
        )
      };
      state.years[initialRoute.sectionId] = initialRoute.year;

      function currentSection() {
        return sectionMap.get(state.section);
      }

      function entryYear(sectionId, entry) {
        const date = sectionId === "journal" ? entry.publishedAt : entry.date;
        return typeof date === "string" ? date.slice(0, 4) : "";
      }

      function latestYear(sectionId) {
        return yearsBySection.get(sectionId)?.[0] || "";
      }

      function routeHash(sectionId, year) {
        return `#${sectionId}${year ? `/${year}` : ""}`;
      }

      function readRoute() {
        const [requestedSection, requestedYear] = location.hash.slice(1).split("/");
        const sectionId = sectionMap.has(requestedSection) ? requestedSection : config.defaultSection;
        const availableYears = yearsBySection.get(sectionId);
        const year = availableYears.includes(requestedYear) ? requestedYear : latestYear(sectionId);
        return { sectionId, year, hash: routeHash(sectionId, year) };
      }

      function updateRoute(sectionId, year, replace = false) {
        const url = new URL(location.href);
        url.hash = routeHash(sectionId, year);
        history[replace ? "replaceState" : "pushState"](null, "", url);
      }

      function entrySearchText(entry) {
        if (state.section === "journal") {
          return [
            ...(entry.content || []).map((part) => part.text),
            ...(entry.images || []).map((image) => image.alt),
            entry.relatedWriting?.label
          ].filter(Boolean).join(" ").toLocaleLowerCase();
        }

        return [
          ...(entry.documents || []).map((documentVersion) => documentVersion.title),
          ...(entry.summaries || []).map((summary) => summary.text)
        ].join(" ").toLocaleLowerCase();
      }

      function formatDate(dateText) {
        const date = new Date(`${dateText}T00:00:00Z`);
        return new Intl.DateTimeFormat("en", {
          day: "2-digit",
          month: "short",
          year: "numeric",
          timeZone: "UTC"
        }).format(date);
      }

      function formatJournalTimestamp(dateText, timeZone) {
        const parts = new Intl.DateTimeFormat("en", {
          day: "2-digit",
          month: "short",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          hourCycle: "h23",
          timeZone
        }).formatToParts(new Date(dateText));
        const value = (type) => parts.find((part) => part.type === type)?.value || "";
        return `${value("day")} ${value("month")} ${value("year")} · ${value("hour")}:${value("minute")}`;
      }

      function formatJournalMonth(monthKey) {
        return new Intl.DateTimeFormat("en", {
          month: "long",
          year: "numeric",
          timeZone: "UTC"
        }).format(new Date(`${monthKey}-01T00:00:00Z`));
      }

      function renderSectionSwitch() {
        for (const button of document.querySelectorAll("[data-section]")) {
          button.setAttribute("aria-pressed", String(button.dataset.section === state.section));
        }
      }

      function renderYearFilter() {
        const yearFilter = byId("year-filter");
        const years = yearsBySection.get(state.section);

        yearFilter.replaceChildren();
        yearFilter.hidden = years.length === 0;

        for (const year of years) {
          const button = document.createElement("button");
          button.className = "year-filter-button";
          button.type = "button";
          button.dataset.year = year;
          button.setAttribute("aria-pressed", String(year === state.years[state.section]));
          button.textContent = year;
          yearFilter.append(button);
        }
      }

      function renderEntry(entry) {
        const fragment = byId("entry-template").content.cloneNode(true);
        const date = fragment.querySelector(".entry-date");
        const title = fragment.querySelector(".entry-title");
        const summary = fragment.querySelector(".entry-summary");

        date.dateTime = entry.date;
        date.textContent = formatDate(entry.date);

        for (const [index, documentVersion] of (entry.documents || []).entries()) {
          if (index > 0) {
            const separator = document.createElement("span");
            separator.className = "entry-title-separator";
            separator.setAttribute("aria-hidden", "true");
            separator.textContent = " / ";
            title.append(separator);
          }

          const anchor = document.createElement("a");
          anchor.className = "entry-title-link";
          anchor.href = documentVersion.url;
          anchor.lang = documentVersion.lang;
          anchor.textContent = documentVersion.title;
          if (documentVersion.newTab) {
            anchor.target = "_blank";
            anchor.rel = "noopener";
          }
          title.append(anchor);
        }
        title.hidden = title.childElementCount === 0;

        for (const summaryPart of entry.summaries || []) {
          const paragraph = document.createElement("p");
          paragraph.lang = summaryPart.lang;
          paragraph.textContent = summaryPart.text;
          summary.append(paragraph);
        }
        summary.hidden = summary.childElementCount === 0;

        return fragment;
      }

      function renderJournalEntry(entry, timeZone) {
        const fragment = byId("journal-template").content.cloneNode(true);
        const post = fragment.querySelector(".journal-post");
        const time = fragment.querySelector(".journal-time");
        const content = fragment.querySelector(".journal-content");
        const media = fragment.querySelector(".journal-media");
        const related = fragment.querySelector(".journal-related");

        post.id = `journal-${entry.id}`;
        time.dateTime = entry.publishedAt;
        time.textContent = formatJournalTimestamp(entry.publishedAt, timeZone);

        for (const contentPart of entry.content || []) {
          const paragraph = document.createElement("p");
          paragraph.lang = contentPart.lang;
          paragraph.textContent = contentPart.text;
          content.append(paragraph);
        }
        content.hidden = content.childElementCount === 0;

        const images = entry.images || [];
        media.dataset.count = String(images.length);
        for (const imageData of images) {
          const image = document.createElement("img");
          image.className = "journal-image";
          image.src = imageData.src;
          image.alt = imageData.alt || "";
          image.loading = "lazy";
          image.decoding = "async";
          media.append(image);
        }
        media.hidden = images.length === 0;

        if (entry.relatedWriting) {
          related.href = entry.relatedWriting.url;
          related.textContent = `Related writing: ${entry.relatedWriting.label}`;
          if (entry.relatedWriting.newTab) {
            related.target = "_blank";
            related.rel = "noopener";
          }
        } else {
          related.hidden = true;
        }

        return fragment;
      }

      function visibleEntries() {
        const query = state.queries[state.section].trim().toLocaleLowerCase();
        const year = state.years[state.section];
        return entriesBySection.get(state.section).filter((entry) => (
          entryYear(state.section, entry) === year
          && (!query || entrySearchText(entry).includes(query))
        ));
      }

      function renderWritingArchive(entries, archiveList) {
        const list = document.createElement("div");
        list.className = "entry-list";

        for (const entry of entries) {
          list.append(renderEntry(entry));
        }

        archiveList.append(list);
      }

      function renderJournalArchive(entries, archiveList, timeZone) {
        const groups = new Map();

        for (const entry of entries) {
          const month = entry.publishedAt.slice(0, 7);
          if (!groups.has(month)) groups.set(month, []);
          groups.get(month).push(entry);
        }

        for (const [month, monthEntries] of groups) {
          const section = document.createElement("section");
          const heading = document.createElement("h2");
          const feed = document.createElement("div");

          section.className = "journal-month-group";
          heading.className = "journal-month-title";
          heading.id = `month-${month}`;
          heading.textContent = formatJournalMonth(month);
          feed.className = "journal-feed";
          section.setAttribute("aria-labelledby", heading.id);

          for (const entry of monthEntries) {
            feed.append(renderJournalEntry(entry, timeZone));
          }

          section.append(heading, feed);
          archiveList.append(section);
        }
      }

      function renderArchive() {
        const archiveList = byId("archive-list");
        const filteredEntries = visibleEntries();
        const section = currentSection();
        const itemName = state.section === "journal"
          ? (filteredEntries.length === 1 ? "post" : "posts")
          : (filteredEntries.length === 1 ? "entry" : "entries");
        const year = state.years[state.section];

        archiveList.replaceChildren();
        byId("archive-summary").textContent = `${filteredEntries.length} ${itemName}${year ? ` in ${year}` : ""}`;

        if (filteredEntries.length === 0) {
          const empty = document.createElement("p");
          empty.className = "empty-state";
          empty.textContent = state.queries[state.section].trim() ? section.noResults : section.empty;
          archiveList.append(empty);
          return;
        }

        if (state.section === "journal") {
          renderJournalArchive(filteredEntries, archiveList, section.timeZone);
        } else {
          renderWritingArchive(filteredEntries, archiveList);
        }
      }

      function renderSection() {
        const section = currentSection();

        document.title = `${section.title} - Xayah Hina`;
        byId("section-title").textContent = section.title;
        byId("search-label").textContent = section.searchLabel;
        byId("search-input").placeholder = section.searchPlaceholder;
        byId("search-input").value = state.queries[state.section];

        renderSectionSwitch();
        renderYearFilter();
        renderArchive();
      }

      function selectSection(sectionId, updateHistory = true) {
        if (!sectionMap.has(sectionId) || sectionId === state.section) return;
        state.section = sectionId;
        if (!yearsBySection.get(sectionId).includes(state.years[sectionId])) {
          state.years[sectionId] = latestYear(sectionId);
        }
        if (updateHistory) updateRoute(sectionId, state.years[sectionId]);
        renderSection();
      }

      function selectYear(year, updateHistory = true) {
        if (!yearsBySection.get(state.section).includes(year) || year === state.years[state.section]) return;
        state.years[state.section] = year;
        if (updateHistory) updateRoute(state.section, year);
        renderYearFilter();
        renderArchive();
      }

      function applyRoute() {
        const route = readRoute();
        state.section = route.sectionId;
        state.years[route.sectionId] = route.year;
        if (location.hash !== route.hash) updateRoute(route.sectionId, route.year, true);
        renderSection();
      }

      byId("skip-link").textContent = config.labels.skip;
      byId("footer-text").textContent = `© ${new Date().getFullYear()} Xayah Hina. ${config.labels.footer}`;

      for (const button of document.querySelectorAll("[data-section]")) {
        button.addEventListener("click", () => selectSection(button.dataset.section));
      }

      byId("year-filter").addEventListener("click", (event) => {
        const button = event.target.closest("[data-year]");
        if (button) selectYear(button.dataset.year);
      });

      byId("search-input").addEventListener("input", (event) => {
        state.queries[state.section] = event.currentTarget.value;
        renderArchive();
      });

      window.addEventListener("popstate", applyRoute);

      if (location.hash !== initialRoute.hash) updateRoute(initialRoute.sectionId, initialRoute.year, true);
      renderSection();
    })();
  </script>
</body>
</html>
