<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">

  <title>Writing &amp; Journal - Xayah Hina</title>
  <meta name="description" content="Writing and journal entries by Xayah Hina on computer graphics, music, and everyday life.">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#111827">
  <link rel="canonical" href="https://i.xayah.me/">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231d4ed8'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-family='sans-serif' font-size='25' font-weight='700' fill='white'%3EXH%3C/text%3E%3C/svg%3E">
  <meta property="og:title" content="Writing &amp; Journal - Xayah Hina">
  <meta property="og:description" content="Writing and journal entries on graphics, music, and everyday life.">
  <meta property="og:url" content="https://i.xayah.me/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">

  <!-- Add formal writing and journal entries to their respective sections. -->
  <script>
    const WRITING_CONFIG = Object.freeze({
      defaultSection: "writing",
      sections: {
        writing: {
          title: "Writing",
          searchLabel: "Search writing",
          searchPlaceholder: "Search writing",
          empty: "No writing has been published yet.",
          noResults: "No writing matches this search.",
          entries: [
            {
              slug: "opening-note",
              date: "2026-07-15",
              tags: ["Introduction"],
              documents: [
                {
                  lang: "en",
                  title: "Opening Note",
                  url: "writing/opening-note/opening-note.pdf",
                  newTab: true
                },
                {
                  lang: "zh-CN",
                  title: "开篇",
                  url: "writing/opening-note/opening-note.pdf",
                  newTab: true
                }
              ],
              summaries: [
                {
                  lang: "en",
                  text: "A short introduction to this writing space and the subjects I hope to return to."
                },
                {
                  lang: "zh-CN",
                  text: "关于这个写作空间，以及我希望持续记录的主题。"
                }
              ]
            }
          ]
        },
        journal: {
          title: "Journal",
          searchLabel: "Search journal entries",
          searchPlaceholder: "Search journal",
          empty: "No journal entries have been published yet.",
          noResults: "No journal entries match this search.",
          entries: []
        }
      },
      labels: {
        skip: "Skip to entries",
        footer: "All rights reserved."
      }
    });
  </script>

  <style>
    :root {
      color-scheme: light dark;
      --page: #ffffff;
      --text: #111827;
      --text-secondary: #374151;
      --muted: #4b5563;
      --subtle: #6b7280;
      --line: #e5e7eb;
      --card: #f9fafb;
      --card-hover: #ffffff;
      --link: #1d4ed8;
      --focus: #2563eb;
      --shadow: 0 10px 22px rgba(17, 24, 39, 0.09);
      --max-width: 56rem;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --page: #111827;
        --text: #f3f4f6;
        --text-secondary: #d1d5db;
        --muted: #9ca3af;
        --subtle: #9ca3af;
        --line: #1f2937;
        --card: #1f2937;
        --card-hover: #253142;
        --link: #93c5fd;
        --focus: #60a5fa;
        --shadow: 0 12px 26px rgba(0, 0, 0, 0.3);
      }
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      min-width: 18rem;
      background: var(--page);
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      color: var(--text);
      background: var(--page);
      font-size: 1rem;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    svg {
      display: block;
      max-width: 100%;
    }

    a {
      color: inherit;
    }

    button,
    input {
      font: inherit;
    }

    :focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    .visually-hidden {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      padding: 0 !important;
      margin: -1px !important;
      overflow: hidden !important;
      clip-path: inset(50%) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }

    .skip-link {
      position: fixed;
      z-index: 10;
      top: 0.75rem;
      left: 0.75rem;
      padding: 0.65rem 0.9rem;
      color: #ffffff;
      background: #111827;
      border-radius: 0.45rem;
      font-weight: 700;
      text-decoration: none;
      transform: translateY(-160%);
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .section-container,
    .site-nav {
      width: calc(100% - 2rem);
      max-width: var(--max-width);
      margin-right: auto;
      margin-left: auto;
    }

    .section-container {
      padding-top: 2rem;
      padding-bottom: 2rem;
    }

    .site-nav {
      display: grid;
      align-items: center;
      grid-template-columns: 1fr auto 1fr;
      min-height: 4rem;
      gap: 1rem;
    }

    .site-name {
      justify-self: start;
      color: var(--text);
      font-weight: 700;
      text-decoration: none;
    }

    .section-switch {
      display: flex;
      align-self: stretch;
      align-items: stretch;
      justify-content: center;
      gap: 1.25rem;
    }

    .section-switch-button {
      position: relative;
      padding: 0.25rem 0;
      color: var(--muted);
      background: transparent;
      border: 0;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: color 150ms ease;
    }

    .section-switch-button::after {
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      height: 2px;
      background: var(--link);
      border-radius: 999px 999px 0 0;
      content: "";
      opacity: 0;
      transform: scaleX(0.65);
      transition: opacity 150ms ease, transform 150ms ease;
    }

    .section-switch-button:hover {
      color: var(--text);
    }

    .section-switch-button[aria-pressed="true"] {
      color: var(--link);
    }

    .section-switch-button[aria-pressed="true"]::after {
      opacity: 1;
      transform: scaleX(1);
    }

    .nav-link {
      justify-self: end;
      color: var(--link);
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
    }

    .nav-link:hover {
      text-decoration: underline;
      text-underline-offset: 0.2em;
    }

    .archive-section {
      padding-top: 1rem;
      border-top: 1px solid var(--line);
    }

    .archive-controls {
      width: 100%;
    }

    .search-control {
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 0.75rem;
      width: 1rem;
      height: 1rem;
      color: var(--subtle);
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1.8;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      min-height: 2.5rem;
      padding: 0.45rem 0.75rem 0.45rem 2.25rem;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 0.5rem;
      font-size: 0.875rem;
    }

    .search-input::placeholder {
      color: var(--subtle);
    }

    .archive-summary {
      margin: 1.75rem 0 0;
      color: var(--subtle);
      font-size: 0.875rem;
    }

    .year-group {
      margin-top: 1.5rem;
    }

    .year-title {
      margin: 0 0 0.6rem;
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
    }

    .entry-list {
      display: grid;
      gap: 0.75rem;
    }

    .entry-card {
      padding: 1rem;
      overflow: hidden;
      background: var(--card);
      border-radius: 0.75rem;
      transition: background-color 150ms ease, box-shadow 150ms ease;
    }

    @media (hover: hover) {
      .entry-card:hover {
        background: var(--card-hover);
        box-shadow: var(--shadow);
      }
    }

    .entry-meta {
      margin-bottom: 0.5rem;
      color: var(--subtle);
      font-size: 0.8rem;
    }

    .entry-date {
      font-variant-numeric: tabular-nums;
    }

    .entry-title {
      margin: 0;
      overflow-wrap: anywhere;
      color: var(--text);
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.4;
    }

    .entry-title-link {
      color: var(--text);
      text-decoration: none;
      transition: color 150ms ease;
    }

    .entry-title-link:hover {
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 0.18em;
    }

    .entry-title-separator {
      color: var(--subtle);
      font-weight: 400;
    }

    .entry-summary {
      margin-top: 0.5rem;
    }

    .entry-summary p {
      margin: 0;
      color: var(--text-secondary);
      line-height: 1.625;
    }

    .entry-summary p + p {
      margin-top: 0.15rem;
      color: var(--muted);
    }

    .entry-tags {
      display: flex;
      flex-wrap: wrap;
      margin: 0.85rem 0 0;
      padding: 0;
      gap: 0.5rem;
      list-style: none;
    }

    .entry-tag {
      padding: 0.2rem 0.6rem;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 0.8rem;
    }

    .empty-state {
      margin: 1.5rem 0 0;
      padding: 2rem 1rem;
      color: var(--muted);
      background: var(--card);
      border-radius: 0.75rem;
      text-align: center;
    }

    .site-footer {
      padding: 1rem;
      color: var(--subtle);
      border-top: 1px solid var(--line);
      font-size: 0.875rem;
      text-align: center;
    }

    .site-footer p {
      margin: 0;
    }

    @media (max-width: 42rem) {
      .site-nav {
        grid-template-columns: 1fr auto;
        padding-top: 0.4rem;
      }

      .section-switch {
        grid-column: 1 / -1;
        grid-row: 2;
        min-height: 2.8rem;
        border-top: 1px solid var(--line);
      }
    }

    @media (max-width: 30rem) {
      .section-container,
      .site-nav {
        width: calc(100% - 1.5rem);
      }

    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <a id="skip-link" class="skip-link" href="#archive">Skip to entries</a>

  <svg class="visually-hidden" aria-hidden="true">
    <symbol id="icon-search" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="7"></circle>
      <path d="m16 16 5 5"></path>
    </symbol>
  </svg>

  <nav class="site-nav" aria-label="Site navigation">
    <a class="site-name" href="/">Xayah Hina</a>
    <div id="section-switch" class="section-switch" role="group" aria-label="Choose a section">
      <button class="section-switch-button" type="button" data-section="writing" aria-pressed="true">Writing</button>
      <button class="section-switch-button" type="button" data-section="journal" aria-pressed="false">Journal</button>
    </div>
    <a class="nav-link" href="https://graphics.xayah.me/">Academic Profile</a>
  </nav>

  <main>
    <section id="archive" class="section-container archive-section" aria-labelledby="section-title">
      <h1 id="section-title" class="visually-hidden">Writing</h1>

      <div class="archive-controls">
        <label class="search-control" for="search-input">
          <span id="search-label" class="visually-hidden">Search articles</span>
          <svg class="search-icon" aria-hidden="true"><use href="#icon-search"></use></svg>
          <input id="search-input" class="search-input" type="search" autocomplete="off" placeholder="Search writing">
        </label>
      </div>

      <p id="archive-summary" class="archive-summary" aria-live="polite"></p>
      <div id="archive-list"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p id="footer-text">© 2026 Xayah Hina. All rights reserved.</p>
  </footer>

  <template id="entry-template">
    <article class="entry-card">
      <div class="entry-meta">
        <time class="entry-date"></time>
      </div>
      <h3 class="entry-title"></h3>
      <div class="entry-summary"></div>
      <ul class="entry-tags" aria-label="Topics"></ul>
    </article>
  </template>

  <script>
    (() => {
      "use strict";

      const config = WRITING_CONFIG;
      const byId = (id) => document.getElementById(id);
      const sectionMap = new Map(Object.entries(config.sections));
      const initialSection = sectionMap.has(location.hash.slice(1))
        ? location.hash.slice(1)
        : config.defaultSection;
      const entriesBySection = new Map(
        [...sectionMap].map(([sectionId, section]) => [
          sectionId,
          [...section.entries].sort((left, right) => right.date.localeCompare(left.date))
        ])
      );
      const state = {
        section: initialSection,
        queries: Object.fromEntries([...sectionMap.keys()].map((sectionId) => [sectionId, ""]))
      };

      function currentSection() {
        return sectionMap.get(state.section);
      }

      function entrySearchText(entry) {
        return [
          ...(entry.documents || []).map((documentVersion) => documentVersion.title),
          ...(entry.summaries || []).map((summary) => summary.text),
          ...(entry.tags || [])
        ].join(" ").toLocaleLowerCase();
      }

      function formatDate(dateText) {
        const date = new Date(`${dateText}T00:00:00Z`);
        return new Intl.DateTimeFormat("en", {
          day: "2-digit",
          month: "short",
          year: "numeric",
          timeZone: "UTC"
        }).format(date);
      }

      function renderSectionSwitch() {
        for (const button of document.querySelectorAll("[data-section]")) {
          button.setAttribute("aria-pressed", String(button.dataset.section === state.section));
        }
      }

      function renderEntry(entry) {
        const fragment = byId("entry-template").content.cloneNode(true);
        const date = fragment.querySelector(".entry-date");
        const title = fragment.querySelector(".entry-title");
        const summary = fragment.querySelector(".entry-summary");
        const tagList = fragment.querySelector(".entry-tags");

        date.dateTime = entry.date;
        date.textContent = formatDate(entry.date);

        for (const [index, documentVersion] of (entry.documents || []).entries()) {
          if (index > 0) {
            const separator = document.createElement("span");
            separator.className = "entry-title-separator";
            separator.setAttribute("aria-hidden", "true");
            separator.textContent = " / ";
            title.append(separator);
          }

          const anchor = document.createElement("a");
          anchor.className = "entry-title-link";
          anchor.href = documentVersion.url;
          anchor.lang = documentVersion.lang;
          anchor.textContent = documentVersion.title;
          if (documentVersion.newTab) {
            anchor.target = "_blank";
            anchor.rel = "noopener";
          }
          title.append(anchor);
        }
        title.hidden = title.childElementCount === 0;

        for (const summaryPart of entry.summaries || []) {
          const paragraph = document.createElement("p");
          paragraph.lang = summaryPart.lang;
          paragraph.textContent = summaryPart.text;
          summary.append(paragraph);
        }
        summary.hidden = summary.childElementCount === 0;

        for (const tag of entry.tags || []) {
          const item = document.createElement("li");
          item.className = "entry-tag";
          item.textContent = tag;
          tagList.append(item);
        }
        tagList.hidden = tagList.childElementCount === 0;

        return fragment;
      }

      function visibleEntries() {
        const query = state.queries[state.section].trim().toLocaleLowerCase();
        return entriesBySection.get(state.section).filter((entry) => (
          !query || entrySearchText(entry).includes(query)
        ));
      }

      function renderArchive() {
        const archiveList = byId("archive-list");
        const filteredEntries = visibleEntries();
        const section = currentSection();
        const groups = new Map();

        archiveList.replaceChildren();
        byId("archive-summary").textContent = `${filteredEntries.length} ${filteredEntries.length === 1 ? "entry" : "entries"}`;

        if (filteredEntries.length === 0) {
          const empty = document.createElement("p");
          empty.className = "empty-state";
          empty.textContent = state.queries[state.section].trim() ? section.noResults : section.empty;
          archiveList.append(empty);
          return;
        }

        for (const entry of filteredEntries) {
          const year = entry.date.slice(0, 4);
          if (!groups.has(year)) groups.set(year, []);
          groups.get(year).push(entry);
        }

        for (const [year, yearEntries] of groups) {
          const section = document.createElement("section");
          const heading = document.createElement("h2");
          const list = document.createElement("div");

          section.className = "year-group";
          heading.className = "year-title";
          heading.id = `year-${year}`;
          heading.textContent = year;
          list.className = "entry-list";
          section.setAttribute("aria-labelledby", heading.id);

          for (const entry of yearEntries) {
            list.append(renderEntry(entry));
          }

          section.append(heading, list);
          archiveList.append(section);
        }
      }

      function renderSection() {
        const section = currentSection();

        document.title = `${section.title} - Xayah Hina`;
        byId("section-title").textContent = section.title;
        byId("search-label").textContent = section.searchLabel;
        byId("search-input").placeholder = section.searchPlaceholder;
        byId("search-input").value = state.queries[state.section];

        renderSectionSwitch();
        renderArchive();
      }

      function selectSection(sectionId, updateHash = true) {
        if (!sectionMap.has(sectionId) || sectionId === state.section) return;
        state.section = sectionId;
        if (updateHash) {
          const url = new URL(location.href);
          url.hash = sectionId;
          history.pushState(null, "", url);
        }
        renderSection();
      }

      byId("skip-link").textContent = config.labels.skip;
      byId("footer-text").textContent = `© ${new Date().getFullYear()} Xayah Hina. ${config.labels.footer}`;

      for (const button of document.querySelectorAll("[data-section]")) {
        button.addEventListener("click", () => selectSection(button.dataset.section));
      }

      byId("search-input").addEventListener("input", (event) => {
        state.queries[state.section] = event.currentTarget.value;
        renderArchive();
      });

      window.addEventListener("popstate", () => {
        const sectionId = location.hash.slice(1);
        selectSection(sectionMap.has(sectionId) ? sectionId : config.defaultSection, false);
      });

      if (!sectionMap.has(location.hash.slice(1))) {
        const url = new URL(location.href);
        url.hash = state.section;
        history.replaceState(null, "", url);
      }

      renderSection();
    })();
  </script>
</body>
</html>
