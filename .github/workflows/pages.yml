name: Deploy Writing to GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Tectonic
        uses: wtfjoke/setup-tectonic@v4
        with:
          tectonic-version: 0.16.9

      - name: Build writing documents
        shell: bash
        run: |
          set -euo pipefail
          mapfile -d '' sources < <(
            find writing -mindepth 2 -maxdepth 2 -type f -name '*.tex' -print0 | sort -z
          )

          for source in "${sources[@]}"; do
            output_dir="$(dirname "$source")"
            tectonic -X compile --untrusted --outdir "$output_dir" "$source"
            pdf="${source%.tex}.pdf"
            if [[ ! -s "$pdf" ]]; then
              echo "Expected PDF was not generated: $pdf" >&2
              exit 1
            fi
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
